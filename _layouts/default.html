<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title }}</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Manrope:wght@400;500;600&display=swap');

    :root {
      --bg: #07131c;
      --bg-soft: #0d1f2b;
      --panel: rgba(8, 20, 31, 0.78);
      --panel-strong: rgba(10, 25, 38, 0.92);
      --line: rgba(157, 204, 219, 0.16);
      --line-strong: rgba(157, 204, 219, 0.28);
      --text: #e7f3f8;
      --text-muted: rgba(205, 227, 235, 0.76);
      --text-soft: rgba(205, 227, 235, 0.52);
      --accent: #63d3d0;
      --accent-strong: #9de0f1;
      --accent-warm: #9cc6ff;
      --shadow: 0 30px 80px rgba(0, 0, 0, 0.38);
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      min-height: 100%;
      background:
        radial-gradient(circle at top, rgba(99, 211, 208, 0.14), transparent 34%),
        linear-gradient(180deg, #0a1822 0%, #07131c 44%, #050d15 100%);
    }

    body {
      font-family: 'Manrope', sans-serif;
      color: var(--text);
      min-height: 100vh;
      background:
        radial-gradient(circle at 16% 18%, rgba(156, 198, 255, 0.16), transparent 28%),
        radial-gradient(circle at 86% 10%, rgba(99, 211, 208, 0.12), transparent 24%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0));
      background-attachment: fixed;
    }

    body::before,
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      background-image:
        linear-gradient(rgba(157, 204, 219, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(157, 204, 219, 0.045) 1px, transparent 1px);
      background-size: 72px 72px;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.8), transparent 85%);
    }

    body::after {
      background:
        radial-gradient(circle at 22% 82%, rgba(99, 211, 208, 0.12), transparent 24%),
        radial-gradient(circle at 76% 68%, rgba(156, 198, 255, 0.08), transparent 22%);
      filter: blur(12px);
      opacity: 0.8;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 980px;
      margin: 0 auto;
      padding: 56px 24px 72px;
    }

    .glass {
      background: linear-gradient(180deg, rgba(12, 28, 42, 0.86), rgba(8, 18, 28, 0.9));
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
    }

    header {
      padding: 38px 42px 32px;
      margin-bottom: 24px;
      text-align: left;
      background:
        linear-gradient(135deg, rgba(99, 211, 208, 0.12), rgba(156, 198, 255, 0.06)),
        var(--panel-strong);
      border: 1px solid var(--line-strong);
      border-radius: 26px;
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }

    header::before {
      content: 'GitHub Pages';
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      margin-bottom: 18px;
      border-radius: 999px;
      border: 1px solid rgba(157, 204, 219, 0.2);
      background: rgba(255, 255, 255, 0.04);
      color: var(--accent-strong);
      font-size: 0.72rem;
      font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    header::after {
      content: '';
      position: absolute;
      inset: auto -8% -28% auto;
      width: 240px;
      height: 240px;
      border-radius: 28px;
      background: linear-gradient(135deg, rgba(99, 211, 208, 0.18), rgba(156, 198, 255, 0.04));
      transform: rotate(18deg);
      filter: blur(4px);
    }

    header h1 {
      display: block;
      position: relative;
      z-index: 1;
      max-width: 12ch;
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2.2rem, 6vw, 3.6rem);
      line-height: 0.96;
      font-weight: 700;
      letter-spacing: -0.05em;
      color: #f5fcff;
      text-wrap: balance;
    }

    .content {
      padding: 38px 42px 40px;
    }

    h1 {
      display: none;
    }

    h2 {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.78rem;
      font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent-strong);
      margin: 34px 0 16px;
    }

    h2::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, rgba(157, 204, 219, 0.28), transparent 82%);
    }

    h2:first-child {
      margin-top: 0;
    }

    p {
      max-width: 66ch;
      font-size: 0.99rem;
      line-height: 1.72;
      color: var(--text-muted);
      margin-bottom: 18px;
    }

    ul {
      list-style: none;
      display: grid;
      gap: 14px;
      margin-bottom: 10px;
    }

    li {
      position: relative;
      overflow: hidden;
      padding: 18px 20px 18px 22px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.035), rgba(255, 255, 255, 0.018)),
        rgba(5, 14, 22, 0.56);
      color: var(--text-soft);
      font-size: 0.92rem;
      line-height: 1.65;
      transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease, background 180ms ease;
    }

    li::before {
      content: '';
      position: absolute;
      inset: 0 auto 0 0;
      width: 3px;
      background: linear-gradient(180deg, var(--accent), var(--accent-warm));
      opacity: 0.7;
    }

    li:hover {
      transform: translateY(-2px);
      border-color: rgba(157, 204, 219, 0.34);
      background:
        linear-gradient(180deg, rgba(99, 211, 208, 0.06), rgba(156, 198, 255, 0.035)),
        rgba(7, 18, 27, 0.7);
      box-shadow: 0 16px 36px rgba(0, 0, 0, 0.22);
    }

    a {
      color: var(--accent);
      text-decoration: none;
      transition: color 160ms ease;
    }

    a:hover {
      color: #baf0ff;
    }

    li a:first-child {
      display: inline-block;
      margin-bottom: 6px;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
      letter-spacing: -0.02em;
      color: #edfaff;
    }

    li a:first-child::after {
      content: '';
      position: absolute;
      inset: 0;
    }

    li a:first-child:hover {
      color: #ffffff;
    }

    footer {
      margin-top: 26px;
      padding: 18px 8px 0;
      text-align: center;
      font-size: 0.8rem;
      color: rgba(205, 227, 235, 0.42);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    @media (max-width: 700px) {
      .wrapper {
        padding: 28px 14px 40px;
      }

      header,
      .content {
        padding: 24px 20px;
      }

      header {
        border-radius: 22px;
      }

      li {
        padding: 16px 18px 16px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <header>
      <h1>{{ page.title | default: site.title }}</h1>
    </header>
    <div class="glass content">
      {{ content }}
    </div>
    <footer>fwkrumm &bull; GitHub Pages</footer>
  </div>
</body>
</html>
